services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pullsing
      POSTGRES_USER: pullsing
      POSTGRES_PASSWORD: pullsing
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pullsing -d pullsing"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PULLSING_ENV: development
      PULLSING_HTTP_ADDR: :8080
      PULLSING_GRPC_ADDR: :50051
      PULLSING_POSTGRES_URL: postgres://pullsing:pullsing@postgres:5432/pullsing?sslmode=disable
      PULLSING_REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
      - "50051:50051"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres-data:
  redis-data:
